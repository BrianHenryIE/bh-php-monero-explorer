name: Unit Tests

# Runs the fast, Docker-free unit suite on every push and pull request. The
# integration suites (which need the regtest + xmrblocks stack) run separately
# in integration-tests.yml; coverage is generated on master in codecoverage.yml.

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:

      - name: Git checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit test suite
        run: vendor/bin/phpunit --testsuite unit
