name: Integration Tests

# Boots the Monero regtest + xmrblocks explorer stack (docker-compose.yml),
# seeds the deterministic chain, and runs the integration suites.
#
# NB: the first run COMPILES xmrblocks from source (~20 minutes). To make CI
# fast, build once locally, push the image to GHCR, and switch the compose
# service from `build:` to `image:` — instructions in docker-compose.yml.
#
# @see MODERNIZATION_AND_INTEGRATION_TEST_PLAN.md

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:

      - name: Git checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Start Monero regtest + xmrblocks containers
        run: docker compose up -d --wait --quiet-pull
        timeout-minutes: 40

      - name: Seed the deterministic regtest chain
        run: php tests/integration/seed-monero-explorer-chain.php

      # xmrblocks' emission monitor only scans reliably to the chain tip on
      # startup against a POPULATED chain; it first came up on the empty
      # pre-seed chain, so /api/emission is stuck at block 0 until this restart
      # (which testGetEmission depends on). Mirrors `make integration-seed`.
      #
      # `restart` (not `docker compose up`) is deliberate: `up <service>`
      # recreates the monero-daemon on GitHub's Compose version, which wipes the
      # freshly seeded chain. We poll the healthcheck directly instead.
      - name: Restart xmrblocks so its emission monitor rescans the seeded chain
        run: |
          docker compose restart xmrblocks
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Health.Status}}' xmrblocks 2>/dev/null || echo starting)
            [ "$status" = healthy ] && break
            sleep 2
          done
          [ "$status" = healthy ] || { echo "xmrblocks did not become healthy after restart"; docker compose logs xmrblocks | tail -30; exit 1; }
          echo "xmrblocks healthy; emission: $(curl -sf http://127.0.0.1:8081/api/emission || true)"

      - name: Run integration test suite (read-only)
        run: vendor/bin/phpunit --testsuite integration
        env:
          MONERO_INTEGRATION_TESTS: '1'

      - name: Run integration test suite (mutating state)
        run: vendor/bin/phpunit --testsuite integration-mutating
        env:
          MONERO_INTEGRATION_TESTS: '1'

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down -v
